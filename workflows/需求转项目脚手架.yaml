name: "需求转项目脚手架"
description: "一句话需求 → 澄清 → 计划 → 生成可落盘的项目脚手架。配合 ao run ... --materialize <目录> 把代码写成真实文件。"
agents_dir: "agency-agents-zh"

llm:
  provider: "deepseek"
  model: "deepseek-chat"

concurrency: 1

inputs:
  - name: idea
    required: true
    description: "想做的东西（一句话即可，如：一个自动记账的命令行小工具）"

steps:
  - id: clarify
    role: "product/product-manager"
    skill: "brainstorming"
    task: "这是自动化流水线，没有人能回答你的提问。请直接基于下面的需求，自行做出合理假设，产出一份简洁的需求与设计要点（意图、核心功能、使用场景、约束、技术选型）。绝对不要反问、不要等待用户确认、不要让用户选 A/B/C。\n\n{{idea}}"
    output: spec

  - id: plan
    role: "engineering/engineering-software-architect"
    skill: "writing-plans"
    task: "把下面的需求与设计写成可执行的分步实现计划：模块划分、文件结构、关键接口、依赖与运行方式。\n\n{{spec}}"
    output: plan
    depends_on: [clarify]

  - id: build
    role: "engineering/engineering-rapid-prototyper"
    skill: "test-driven-development"
    task: |
      这是自动化流水线，没有人能回答你的提问。直接基于下面的计划实现一个可运行的最小项目脚手架，
      对任何不明确之处用合理默认值，绝对不要反问、不要等待确认、不要让用户做选择。

      {{plan}}

      严格按以下格式输出每个文件（供自动落盘解析），不要输出与文件无关的解说：

      ### 相对/路径/文件名.ext
      ```语言
      <该文件的完整内容>
      ```

      要求：
      - 包含入口文件、依赖清单（如 package.json / requirements.txt）、README 运行说明、以及基本测试。
      - 一律用相对路径，禁止绝对路径或包含 `..`。
      - 代码要能跑起来（缺省值齐全、无明显语法错误）。
      - 重要：如果某个文件内容本身包含 ``` 代码围栏（典型是 README.md 等 markdown 文件），请用四个反引号 ```` 作为该文件的外层围栏，避免内层围栏被误判截断。
    output: code
    depends_on: [plan]

  - id: verify
    role: "engineering/engineering-code-reviewer"
    skill: "verification-before-completion"
    task: "审查下面生成的项目脚手架：完整性、可运行性、缺失文件、明显 bug，以及跑起来还需补的步骤。用证据说话，给出清单。\n\n{{code}}"
    output: review
    depends_on: [build]
