name: "投资标的分析（股票/基金/行业）"
description: "基本面研究 + 财务分析 + 风险识别 + CFO 综合建议"

agents_dir: "agency-agents-zh"

llm:
  provider: "deepseek"
  model: "deepseek-chat"
  max_tokens: 8192
  retry: 2

concurrency: 3

inputs:
  - name: target
    description: "分析标的（如：贵州茅台 / 纳指ETF / 新能源汽车行业）"
    required: true
  - name: investor_profile
    description: "投资者画像（可选，如：30 岁工薪，风险承受中等，持有期 3-5 年）"
    required: false
    default: "普通个人投资者，风险承受中等，持有期 1-3 年"
  - name: capital_size
    description: "可投资金（可选，如：10 万元）"
    required: false
    default: "未指定，请按一般区间给建议"

steps:
  - id: research
    role: "finance/finance-investment-researcher"
    name: "投资研究员"
    emoji: "🔬"
    task: |
      针对标的「{{target}}」做基本面研究。

      输出结构（400-500 字）:
      1. **标的性质**: 是什么（个股/基金/行业）、所属板块、当前关键特征
      2. **核心驱动**: 这个标的价值/价格受哪些因素驱动（3-5 个）
      3. **近期催化**: 当前有哪些事件可能影响（政策/业绩/行业周期）
      4. **竞争格局**: 如果是个股/行业，对手是谁、优劣势对比
      5. **估值水位**: PE / PB / 或同类对比的相对位置（如果数据不足请明确说明"需核实"）

      ⚠️ 不知道的数据必须明确标注「需核实」，不要瞎编数字。
    output: research

  - id: financial
    role: "finance/finance-financial-analyst"
    name: "财务分析师"
    emoji: "📊"
    task: |
      围绕「{{target}}」做财务维度分析。

      研究背景:
      {{research}}

      输出（300-400 字）:
      1. **盈利能力**: 营收增速、毛利率、净利率趋势（适用于个股/企业）
      2. **现金流健康度**: 经营性现金流情况，是否持续正向
      3. **负债与杠杆**: 资产负债率水平，是否健康
      4. **ROE / ROIC**: 股东回报率水平
      5. **同行对比**: 相比同类标的，财务质量排第几档

      对于基金/ETF，把上述项替换为：规模、费率、历史回报、夏普比率、跟踪误差。

      ⚠️ 数据不确定处明确标注「需核实最新财报」。
    output: financial
    depends_on: [research]

  - id: risk
    role: "finance/finance-fraud-detector"
    name: "风控专家"
    emoji: "⚠️"
    task: |
      基于研究和财务分析，盘点投资「{{target}}」的主要风险。

      研究:
      {{research}}

      财务:
      {{financial}}

      输出（300 字）:
      1. **系统性风险**: 宏观/政策层面的风险（2-3 个）
      2. **行业风险**: 行业特有的周期或结构性风险
      3. **个体风险**: 标的本身的致命弱点（商业模式/财务隐雷/管理层问题）
      4. **黑天鹅场景**: 最坏情况可能的亏损幅度
      5. **止损线建议**: 建议的止损点位或触发条件

      每条风险明确标「发生概率」（高/中/低）。
    output: risk
    depends_on: [research, financial]

  - id: cfo_opinion
    role: "finance/finance-financial-forecaster"
    name: "CFO 顾问"
    emoji: "💼"
    task: |
      你是 CFO 顾问，把前面研究员、财务分析师、风控专家的工作整合成一份**完整、可直接交付给投资者的投资分析报告**——不要只给结论，要把上游的分析内容整合进报告里。

      研究: {{research}}
      财务: {{financial}}
      风险: {{risk}}

      投资者画像: {{investor_profile}}
      可用资金: {{capital_size}}

      输出一份完整 markdown 报告，**充实展开、不要压缩**，必须包含全部四部分：

      # {{target}} 投资分析报告

      ## 一、标的概览与基本面
      整合研究员结论：标的性质、核心驱动、近期催化、竞争格局、估值水位。

      ## 二、财务质量
      整合财务分析师发现：盈利能力、现金流、负债杠杆、回报率、同行对比。

      ## 三、风险评估
      整合风控发现：系统性/行业/个体风险、黑天鹅场景、止损线，每条标概率（高/中/低）。

      ## 四、投资建议（CFO 综合判断）
      - **结论**: 买入 / 观望 / 不建议（明确选一个）
      - **核心逻辑**: 3-5 句
      - **仓位建议**: 配比 % + 买入节奏（含触发条件，结合投资者画像与资金）
      - **持有期与退出条件**
      - **关键跟踪指标**: 3-5 个
      - **不适合的情况**

      > 免责声明: 本分析仅供参考，不构成投资建议。股市有风险，投资需谨慎。

      ⚠️ 只输出这份报告本身（四部分齐全、内容充实）：不要开场白/寒暄、不要"我改了什么/复盘"、不要向用户提问、不要建议 ao 命令或后续动作、不要"要我继续吗"之类收尾。
    output: final_advice
    depends_on: [financial, risk]
