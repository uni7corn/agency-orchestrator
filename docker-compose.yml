# Agency Orchestrator — NAS/家庭服务器一键部署（#93）
#   docker compose up -d && 打开 http://<主机IP>:8088
# 密钥两种给法（选一即可）：
#   1) 打开页面 →「供应商」里粘贴 key（存进 ao-data 卷，重启不丢）
#   2) 下面 environment 里直接给环境变量
services:
  agency-orchestrator:
    image: ghcr.io/jnmetacode/agency-orchestrator:latest
    container_name: agency-orchestrator
    ports:
      - "8088:8088"
    volumes:
      - ao-data:/data
    environment:
      # - DEEPSEEK_API_KEY=sk-xxx
      # - DUOYUANX_API_KEY=sk-xxx
      - TZ=Asia/Shanghai
    restart: unless-stopped

volumes:
  ao-data:
