# Docker 镜像发布（#93）：构建多架构镜像推到 GHCR（用仓库自带 GITHUB_TOKEN，无需 Docker Hub 账号）
#   手动触发：gh workflow run release-docker.yml -f version=0.11.0
#   version = 要打包的 npm 版本（也作为镜像 tag），同时刷新 :latest
name: Release Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm 版本号（如 0.11.0），镜像 tag 同名并刷新 latest"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AO_VERSION=${{ inputs.version }}
          tags: |
            ghcr.io/jnmetacode/agency-orchestrator:${{ inputs.version }}
            ghcr.io/jnmetacode/agency-orchestrator:latest
